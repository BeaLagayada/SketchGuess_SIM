name: Smoke Test after Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Wait for Render deployment (45s)
        run: sleep 45

      - name: Smoke test - homepage loads
        run: |
          curl --fail --silent --head https://YOUR-APP-NAME.onrender.com | head -n 1 | grep "200 OK"

      - name: Smoke test - WebSocket handshake
        run: |
          curl --fail --silent https://YOUR-APP-NAME.onrender.com/socket.io/?EIO=4&transport=polling | grep "sid"
