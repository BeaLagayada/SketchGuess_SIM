name: Smoke Test after Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci || npm install
        working-directory: ./SketchGuess_SIM/SketchGuess_SIM/tests

      # Start your server.js in the background
      - name: Start server
        run: |
          nohup node server.js &
        working-directory: ./SketchGuess_SIM/SketchGuess_SIM/tests

      # Give the server time to boot
      - name: Wait for local server (10s)
        run: sleep 10

      # Verify homepage loads locally
      - name: Smoke test - homepage loads
        run: |
          curl --fail --silent --head http://localhost:3000 | head -n 1 | grep "200 OK"

      # Verify WebSocket handshake locally
      - name: Smoke test - WebSocket handshake
        run: |
          curl --fail --silent http://localhost:3000/socket.io/?EIO=4&transport=polling | grep "sid"
