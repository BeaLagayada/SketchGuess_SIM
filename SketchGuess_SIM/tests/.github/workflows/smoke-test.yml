name: Smoke Test after Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (in subfolder)
        working-directory: ./SketchGuess_SIM/SketchGuess_SIM/tests
        run: npm install

      - name: Wait for Render deployment (60s)
        run: sleep 60

      - name: Smoke test - homepage loads
        run: |
          curl --fail --silent --head https://sketchguess.onrender.com | head -n 1 | grep "200 OK"

      - name: Smoke test - WebSocket handshake
        run: |
          curl --fail --silent https://sketchguess.onrender.com/socket.io/?EIO=4&transport=polling | grep "sid"